        position: PhD Researcher
        location: Fiesole, Italy
        start_date: 2022
        end_date: present
        summary: PhD research focuses on the intersection between polarization and political support, investigating how different types of polarization affect democracies and under which conditions they are harmful or beneficial.
        highlights:
          - Supervisor&#58; Professor Filip Kostelka

      - company: Radboud University
        position: Teaching and Research Assistant
        location: Nijmegen, The Netherlands
        start_date: 2020
        end_date: 2022
        highlights:
          - "Taught: Political Science Research Methods; Project 1 (Political attitudes and behavior in the Netherlands); Project 3 (Comparative Governance); Sociology, Philosophy, and Ethics of Research; Bachelor thesis supervision."
          - "Policy reports for the Dutch Electoral Council and the Netherlands Institute for Social Research."

    Projects:
      - name: R-Evolve (HORIZON Funded Project)
        summary: Advised on survey design and data quality assessment for circular economy transition research; developed a Shiny app to support co-design workshops for consumer involvement and persona identification.
        start_date: 2025-07-01
        end_date: present

      - name: EUandI
        summary: Data-cleaning and analyses using survey data collected from the EUandI voting application.
        start_date: 2024-10-01
        end_date: present

      - name: Wageningen University – Research Visit
        summary: Participated in the Mobilization of Political Dissatisfaction project (NWO Vici grant), complementing own research with project data.
        start_date: 2024-09-01
        end_date: 2024-12-01

      - name: SOLID (ERC Funded Project)
        summary: Coded Dutch newspaper articles for content analysis of party-issue relationships during electoral campaigns using a standardised coding framework.
        start_date: 2024-01-01
        end_date: 2024-02-01

      - name: Searching for Europe
        summary: Fielded pre- and post-surveys during a series of theater shows about the European Union to measure impact. Role focused on improving research design and executing statistical analyses.
        start_date: 2023-05-01
        end_date: 2023-12-01

