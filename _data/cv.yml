cv:
  name: Toine Fiselier
  label: PhD Researcher in Political Science
  image: ""
  summary: PhD Researcher at the European University Institute specialising in the intersection of polarization and political support. His work investigates how different types of polarization affect democratic legitimacy and under which conditions polarization is harmful or beneficial for democracies.

  sections:
