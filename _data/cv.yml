        url: https://www.ru.nl/
        area: Comparative Politics
        studyType: Master of Science (MSc)
        start_date: 2019
        end_date: 2020
        highlights:
          - "Thesis: \"It's all 'bout the money: A thesis on the relation between changes in income and political support in the Netherlands.\""
          - "Methods: Panel data analysis"

      - institution: Radboud University
        location: Nijmegen, The Netherlands
        url: https://www.ru.nl/
        area: Political Science
